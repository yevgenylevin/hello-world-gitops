apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world-stage
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://github.com/yevgenylevin/hello-world-gitops.git
      targetRevision: main
      path: helm/hello-world
      helm:
        releaseName: hello-world-stage
        valueFiles:
          - $values/environments/stage/values.yaml

    - repoURL: https://github.com/yevgenylevin/hello-world-gitops.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: hello-world-stage

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true